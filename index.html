<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeTrack - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="logo">CodeTrack.</h1>
            <div class="nav-links">
                <span id="user-greeting">Hello!</span>
                <button id="logout-btn" class="btn secondary-btn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="glass-panel add-activity-panel">
            <h2>Log Today's Activity</h2>
            <form id="activity-form">
                <div class="input-row">
                    <div class="input-group">
                        <label for="platform">Platform</label>
                        <select id="platform" required>
                            <option value="LEETCODE">LeetCode</option>
                            <option value="CODECHEF">CodeChef</option>
                            <option value="CODEFORCES">Codeforces</option>
                            <option value="HACKERRANK">HackerRank</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label for="time">Time Spent (Minutes)</label>
                        <input type="number" id="time" min="0" required placeholder="e.g. 60">
                    </div>
                    <div class="input-group">
                        <label for="problems">Problems Solved</label>
                        <input type="number" id="problems" min="0" required placeholder="e.g. 2">
                    </div>
                </div>
                <button type="submit" class="btn primary-btn">Save Activity</button>
                <div id="activity-msg"></div>
            </form>
        </div>

        <div class="dashboard-grid">
            <div class="glass-panel stats-panel">
                <h2>AI Suggestions</h2>
                <div id="suggestions-list" class="suggestions-list">
                    <!-- Suggestions will be loaded here -->
                </div>
            </div>

            <div class="glass-panel history-panel">
                <h2>Activity History</h2>
                <div class="table-container">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Platform</th>
                                <th>Time (m)</th>
                                <th>Solved</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Logs will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
